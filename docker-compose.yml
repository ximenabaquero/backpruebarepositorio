services:

  # ─────────────────────────────────────────────
  # PHP / Laravel
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: olga_app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - .:/var/www
      - /var/www/vendor

    networks:
      - olga

    depends_on:
      - mysql

  # ─────────────────────────────────────────────
  # Nginx
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine

    container_name: olga_nginx

    restart: unless-stopped

    ports:
      - "8000:80"

    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    networks:
      - olga

    depends_on:
      - app

  # ─────────────────────────────────────────────
  # MySQL
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0

    container_name: olga_mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: coldesthetic
      MYSQL_ROOT_PASSWORD: Dianabaquero1@

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - olga

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  olga:
    driver: bridge

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local