services:
  # ─────────────────────────────────────────────
  # PHP — ejecuta Laravel
  # ─────────────────────────────────────────────
  app:
    build:
      context: . # usa el Dockerfile de esta carpeta
      dockerfile: Dockerfile
    container_name: podocare_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      # Sincroniza tu código local con el contenedor en tiempo real.
      # Así cada cambio que hagas en tu editor se refleja sin reconstruir.
      - .:/var/www
      # Excluimos vendor del sync — se usa el que se instaló dentro del contenedor
      - /var/www/vendor
    networks:
      - podocare
    depends_on:
      - mysql

  # ─────────────────────────────────────────────
  # Nginx — servidor web, recibe peticiones HTTP
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine # imagen oficial de Nginx, versión liviana
    container_name: podocare_nginx
    restart: unless-stopped
    ports:
      # Puerto 8000 de tu máquina → puerto 80 del contenedor Nginx
      # Así accedés a la API desde http://localhost:8000
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - podocare
    depends_on:
      - app

  # ─────────────────────────────────────────────
  # MySQL — base de datos
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: podocare_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:
      MYSQL_ROOT_PASSWORD:
    ports:
      # Puerto 3307 de tu máquina → 3306 del contenedor
      # Usamos 3307 para no chocar si ya tenés MySQL local en 3306
      - "3307:3306"
    volumes:
      # Volumen persistente: los datos de MySQL NO se pierden al bajar los contenedores
      - mysql_data:/var/lib/mysql
    networks:
      - podocare

# ─────────────────────────────────────────────
# Red interna compartida por los 3 contenedores
# ─────────────────────────────────────────────
networks:
  podocare:
    driver: bridge

# ─────────────────────────────────────────────
# Volumen para persistir los datos de MySQL
# ─────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
