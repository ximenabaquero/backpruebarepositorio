server {
    # Nginx escucha en el puerto 80 dentro de su contenedor
    listen 80;

    # La raíz pública de Laravel siempre es /public
    root /var/www/public;
    index index.php index.html;

    # Todas las rutas que no existan como archivo se mandan a index.php
    # Esto es lo que hace funcionar las rutas de Laravel (api/users, api/inventory, etc.)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Cuando la URL termina en .php, Nginx se lo pasa a PHP-FPM
    # "app" es el nombre del contenedor PHP en docker-compose.yml
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Ignoramos el log de favicon para no llenar los logs de errores
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Archivos de assets: se sirven directo sin pasar por PHP
    location ~* \.(css|js|png|jpg|gif|ico|svg|woff|woff2|ttf)$ {
        expires max;
        log_not_found off;
    }
}
